<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MADUP Factbook Viewer</title>
<link rel="stylesheet" href="assets/style.css?v=8">
<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body data-edit="off">

<header class="topbar">
  <a href="index.html" class="back">← 광고주 목록</a>
  <span class="title" id="hdr-title">팩트북 로딩 중…</span>
  <span class="pill" id="hdr-pt">PT —</span>
  <span class="pill" id="hdr-variant">변형 —</span>
  <span class="pill" id="hdr-updated">업데이트 —</span>
  <div class="stats">
    <span class="stat auto">자동 작성 <em id="stat-auto">0</em></span>
    <span class="stat progress">작성 중 <em id="stat-progress">0</em></span>
    <span class="stat client">광고주 확인 <em id="stat-client">0</em></span>
    <span class="stat madup">매드업 도구 <em id="stat-madup">0</em></span>
  </div>
  <div class="actions">
    <button id="btn-edit" class="action-btn">✏️ 편집 모드</button>
    <button id="btn-export-pptx" class="action-btn" title="현재 팩트북을 PowerPoint(.pptx)로 다운로드">⬇ PPT</button>
    <button id="btn-export" class="action-btn">⬇ JSON</button>
    <button id="btn-import" class="action-btn">⬆ Import</button>
    <input type="file" id="file-import" accept="application/json" hidden>
  </div>
</header>

<div class="container">

  <aside class="sidebar">
    <h2>검색</h2>
    <input type="search" id="search-box" placeholder="키워드 검색…">

    <h2>필터 — 상태</h2>
    <div class="status-filters">
      <span class="filter-chip all" data-filter="all" data-active="true">전체</span>
      <span class="filter-chip auto" data-filter="auto">자동</span>
      <span class="filter-chip progress" data-filter="progress">작성중</span>
      <span class="filter-chip client" data-filter="client">광고주</span>
      <span class="filter-chip madup" data-filter="madup">매드업</span>
    </div>

    <h2>필터 — 출처</h2>
    <div class="source-filters">
      <span class="src-chip src-lm" data-source="lm">📊 리스닝마인드</span>
      <span class="src-chip src-naver" data-source="naver">🌐 네이버 API</span>
      <span class="src-chip src-lever" data-source="lever">🎨 Lever Xpert</span>
      <span class="src-chip src-madup-tool" data-source="madup-tool">⚙️ 매드업 도구</span>
      <span class="src-chip src-news" data-source="news">📰 뉴스기사</span>
      <span class="src-chip src-consulting" data-source="consulting">💼 컨설팅</span>
      <span class="src-chip src-academic" data-source="academic">🎓 학술</span>
      <span class="src-chip src-client" data-source="client-doc">📄 광고주 자료</span>
    </div>

    <h2>목차 (INDEX)</h2>
    <nav class="index-nav" id="index-nav">
      <!-- JS가 채움 -->
    </nav>

    <div class="edit-only" hidden>
      <h2>편집</h2>
      <button id="btn-add-slide" class="action-btn full">+ 새 슬라이드</button>
      <button id="btn-save-local" class="action-btn full">💾 로컬 저장</button>
      <div class="save-status" id="save-status"></div>
    </div>
  </aside>

  <main class="main" id="slides-container">
    <!-- JS가 슬라이드 렌더링 -->
  </main>

</div>

<!-- 슬라이드 추가 모달 -->
<div class="modal" id="modal-add" hidden>
  <div class="modal-body">
    <h3>새 슬라이드 추가</h3>
    <label>챕터 <select id="add-chapter"></select></label>
    <label>카테고리 라벨 <input type="text" id="add-meta" placeholder="예: 시장환경 · 신규"></label>
    <label>Status
      <select id="add-status">
        <option value="auto">자동 작성</option>
        <option value="progress">작성 중</option>
        <option value="client">광고주 확인 필요</option>
        <option value="madup">매드업 도구 활용</option>
      </select>
    </label>
    <label>헤드라인 인사이트 (한 줄)
      <textarea id="add-title" rows="3" placeholder="❏ 마커는 자동 추가됨. 데이터 나열 No, 인사이트로 작성"></textarea>
    </label>
    <div class="modal-actions">
      <button id="btn-add-confirm">추가</button>
      <button id="btn-add-cancel">취소</button>
    </div>
  </div>
</div>

<script src="assets/viewer.js?v=8"></script>
<script>
  // 데이터 로딩 (URL 파라미터로 광고주 선택)
  const params = new URLSearchParams(location.search);
  const client = params.get('c') || 'yakson';
  loadFactbook(`data/${client}/factbook.json`);
</script>

</body>
</html>
